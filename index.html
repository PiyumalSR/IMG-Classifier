<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Image Predictor</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f4f7f6; color: #333; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; }
        .container { background: white; padding: 30px; border-radius: 12px; box-shadow: 0 8px 20px rgba(0,0,0,0.1); width: 100%; max-width: 400px; text-align: center; }
        h2 { margin-top: 0; color: #2c3e50; }
        .file-upload { margin: 20px 0; padding: 20px; border: 2px dashed #3498db; border-radius: 8px; cursor: pointer; background: #f9fbfc; transition: 0.3s; }
        .file-upload:hover { background: #eef5fa; }
        img#preview { max-width: 100%; max-height: 250px; margin-top: 15px; border-radius: 8px; display: none; margin-left: auto; margin-right: auto;}
        button { background: #3498db; color: white; border: none; padding: 12px 20px; width: 100%; border-radius: 6px; font-size: 16px; cursor: pointer; transition: 0.3s; font-weight: bold;}
        button:hover { background: #2980b9; }
        #result-box { margin-top: 20px; padding: 15px; border-radius: 6px; display: none; word-wrap: break-word; text-align: center;}
        .loader { display: none; border: 4px solid #f3f3f3; border-top: 4px solid #3498db; border-radius: 50%; width: 30px; height: 30px; animation: spin 1s linear infinite; margin: 15px auto; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>

<div class="container">
    <h2>AI Image Predictor</h2>
    
    <div class="file-upload" onclick="document.getElementById('imageInput').click()">
        <p>📁 Click to Upload Image</p>
        <input type="file" id="imageInput" accept="image/*" style="display: none;" onchange="previewImage(event)">
    </div>
    
    <img id="preview" alt="Image Preview">

    <button onclick="makePrediction()">Analyze Image</button>

    <div class="loader" id="loader"></div>
    <div id="result-box"></div>
</div>

<script>
    // ==========================================
    // ⚠️ HARDCODE YOUR RENDER URL HERE ⚠️
    // ==========================================
    const MY_RENDER_URL = "https://generate-mask-ixuo.onrender.com/predict"; 
    // Example: "https://dinushka-ml-api.onrender.com/predict"
    // ==========================================

    // Show image preview when user selects a file
    function previewImage(event) {
        const reader = new FileReader();
        reader.onload = function() {
            const preview = document.getElementById('preview');
            preview.src = reader.result;
            preview.style.display = 'block';
        }
        reader.readAsDataURL(event.target.files[0]);
    }

    // Send image to your Render API
    async function makePrediction() {
        const imageFile = document.getElementById('imageInput').files[0];
        const resultBox = document.getElementById('result-box');
        const loader = document.getElementById('loader');

        if (!imageFile) {
            alert("Please select an image first!");
            return;
        }

        if (MY_RENDER_URL === "https://generate-mask-ixuo.onrender.com/predict") {
            alert("Developer Error: You forgot to paste your Render URL into the code!");
            return;
        }

        // Prepare the image to be sent
        const formData = new FormData();
        formData.append("file", imageFile);

        // Show loading animation, hide previous results
        loader.style.display = "block";
        resultBox.style.display = "none";

        try {
            // Send the request across the internet
            const response = await fetch(MY_RENDER_URL, {
                method: 'POST',
                body: formData
            });

            const data = await response.json();
            
            // Hide loading animation
            loader.style.display = "none";
            resultBox.style.display = "block";

            // Display the results
            if (response.ok) {
                // 1. The 10 categories your model knows
                const classes = ["Airplane", "Automobile", "Bird", "Cat", "Deer", "Dog", "Frog", "Horse", "Ship", "Truck"];
                
                // 2. Get the raw numbers
                const probabilities = data.prediction[0];
                
                // 3. Find the highest number in the list
                let maxIndex = 0;
                let maxProb = probabilities[0];
                for (let i = 1; i < probabilities.length; i++) {
                    if (probabilities[i] > maxProb) {
                        maxProb = probabilities[i];
                        maxIndex = i;
                    }
                }

                // 4. Get the winning label and format the percentage
                const winningLabel = classes[maxIndex];
                const confidence = (maxProb * 100).toFixed(1); 

                // 5. Display the human-readable result!
                resultBox.style.background = "#e8f8f5";
                resultBox.style.color = "#117a65";
                resultBox.innerHTML = `<h3 style="margin:0; font-size: 24px;">${winningLabel}</h3><p style="margin:5px 0 0 0; font-size: 16px;">Confidence: ${confidence}%</p>`;
                
            } else {
                resultBox.style.background = "#fadbd8";
                resultBox.style.color = "#943126";
                resultBox.innerText = "Error: " + data.detail;
            }
        } catch (error) {
            loader.style.display = "none";
            resultBox.style.display = "block";
            resultBox.style.background = "#fadbd8";
            resultBox.style.color = "#943126";
            resultBox.innerText = "Connection failed. Make sure your Render API is Live and the URL is correct.";
        }
    }
</script>

</body>
</html>
